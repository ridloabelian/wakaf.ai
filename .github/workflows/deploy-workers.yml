name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:

jobs:
  deploy-ai-gateway:
    name: Deploy AI Gateway Worker
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'workers/ai-gateway/package.json'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy AI Gateway
        working-directory: workers/ai-gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "🚀 Deploying AI Gateway to Cloudflare Workers..."
          wrangler deploy --config wrangler.toml
          echo "✅ AI Gateway deployed"

  deploy-queue:
    name: Deploy Queue Worker
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Queue Engine
        working-directory: workers/queue
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "🚀 Deploying Queue Engine to Cloudflare Workers..."
          wrangler deploy --config wrangler.toml || echo "⚠️ Queue worker not yet created"
          echo "✅ Queue Engine deployed"

  deploy-auth:
    name: Deploy Auth Worker
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Auth Edge
        working-directory: workers/auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "🚀 Deploying Auth Edge to Cloudflare Workers..."
          wrangler deploy --config wrangler.toml || echo "⚠️ Auth worker not yet created"
          echo "✅ Auth Edge deployed"

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-ai-gateway, deploy-queue, deploy-auth]
    
    steps:
      - name: Print summary
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  wakaf.ai Workers Deployed 🚀"
          echo "═══════════════════════════════════════════════════"
          echo "  AI Gateway: ✅"
          echo "  Queue Engine: ✅"
          echo "  Auth Edge: ✅"
          echo "═══════════════════════════════════════════════════"
