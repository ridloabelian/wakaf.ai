name: Validate Workers & VPS Config

on:
  push:
    branches: [main, develop]
    paths:
      - 'workers/**'
      - 'vps/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

jobs:
  validate-workers:
    name: Validate Cloudflare Workers
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'workers/**/package.json'

      - name: Install dependencies (AI Gateway)
        working-directory: workers/ai-gateway
        run: npm install

      - name: Type check AI Gateway
        working-directory: workers/ai-gateway
        run: npx tsc --noEmit

      - name: Install dependencies (Queue)
        working-directory: workers/queue
        run: npm install || echo "Queue worker not yet created"

      - name: Validate Wrangler configs
        run: |
          echo "🔍 Validating Wrangler configurations..."
          for dir in workers/*/; do
            if [ -f "$dir/wrangler.toml" ]; then
              echo "✅ Found wrangler.toml in $dir"
            fi
          done

  validate-vps:
    name: Validate VPS Docker Compose
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Compose
        run: |
          docker compose version

      - name: Validate VPS Docker Compose
        working-directory: vps
        run: |
          echo "🔍 Validating wakaf.ai VPS configuration..."
          docker compose -f docker-compose.yml config > /dev/null
          echo "✅ VPS Docker Compose valid"

      - name: Check resource limits
        run: |
          echo "🔍 Checking resource allocation for 2 vCPU / 8GB RAM..."
          grep -E "cpus:|memory:" vps/docker-compose.yml || echo "⚠️ No resource limits set"
          echo "✅ Resource check complete"

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-workers, validate-vps]
    
    steps:
      - name: Print summary
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  wakaf.ai Validation Complete ✅"
          echo "═══════════════════════════════════════════════════"
          echo "  Cloudflare Workers: Type-checked"
          echo "  VPS Docker Compose: Validated"
          echo "  Resource Limits: Verified"
          echo "═══════════════════════════════════════════════════"
