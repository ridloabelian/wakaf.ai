name = "wakaf-ai-gateway"
main = "src/index.ts"
compatibility_date = "2024-06-19"

[vars]
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-namespace-id"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

# Secrets (set via wrangler secret put)
# OPENROUTER_API_KEY
# ANTHROPIC_API_KEY
# OPENAI_API_KEY
